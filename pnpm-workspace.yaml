# ELI5: a "workspace" tells pnpm this repo holds MULTIPLE packages (our API
# and, later, a web dashboard). pnpm installs all their dependencies together
# and lets them reference each other locally.
packages:
  - "apps/*"
# scarf is opt-in download analytics inside a transitive dependency — we
# don't need it to run anything, so its install script stays blocked.
allowBuilds:
  # Prisma's install scripts fetch its query engine — required, allow them.
  '@prisma/engines': true
  '@scarf/scarf': false
  prisma: true
